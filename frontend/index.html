<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚗 Carros Pixar - Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🚗 Carros Pixar</h1>
    <p class="subtitle">Descubra personagens do filme Carros!</p>

    <div class="car-area" id="carArea">
      <img src="" alt="Personagem do filme Carros" id="carImage">
      <div id="carName"></div>
    </div>

    <div class="controls">
      <button id="randomBtn">🚙 Carro Aleatório</button>
    </div>

    <div class="search">
      <input
        type="text"
        id="carInput"
        placeholder="Digite o nome (ex: mcqueen, mater, sally)"
      >
      <button id="searchBtn">🔍 Buscar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
